<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="sunGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd24d"/>
      <stop offset="100%" stop-color="#ff9a3c"/>
    </linearGradient>
    <linearGradient id="cloudBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cfe8ff"/>
      <stop offset="100%" stop-color="#9fc6ff"/>
    </linearGradient>
  </defs>
  <!-- Blue background -->
  <rect width="128" height="128" rx="20" fill="#0b5fc4"/>

  <!-- Sun placed slightly left and down so it sits behind the cloud -->
  <circle cx="46" cy="54" r="16" fill="url(#sunGradient)"/>

  <!-- Cloud in front of the sun -->
  <g>
    <path d="M34 74c0-13 11-23 24-23h26c11 0 20 9 20 20s-9 20-20 20H58c-9 0-24-2-24-17z" fill="url(#cloudBlue)"/>
    <path d="M44 80c0-9 8-16 17-16h24c9 0 17 8 17 17s-8 17-17 17H61c-9 0-17-8-17-17z" fill="#dff4ff" opacity="0.95"/>
  </g>

  <!-- Ground / base accent -->
  <path d="M40 94c0-6 6-12 12-12h32c6 0 12 6 12 12s-6 12-12 12H52c-6 0-12-6-12-12z" fill="#6f8fb8" opacity="0.9"/>
</svg>